<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Nutricional - NutriAI</title>
  <link rel="stylesheet" href="calculadora-style.css">
</head>
<body>
  <div class="calc-container">
    <header>
      <h1>Calculadora Nutricional</h1>
      <p class="subtitle">Estime suas necessidades diárias de calorias e macros.</p>
      <a href="index.html" class="back-link">← Voltar ao Painel</a>
    </header>

    <form action="#" method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label for="age">Idade</label>
          <input type="number" id="age" name="age" placeholder="Anos" required min="15">
        </div>
        <div class="form-group">
          <label for="gender">Gênero</label>
          <select id="gender" name="gender">
            <option value="male">Masculino</option>
            <option value="female">Feminino</option>
          </select>
        </div>
        <div class="form-group">
          <label for="height">Altura (cm)</label>
          <input type="number" id="height" name="height" placeholder="cm" required min="100">
        </div>
        <div class="form-group">
          <label for="weight">Peso (kg)</label>
          <input type="number" id="weight" name="weight" placeholder="kg" required min="30">
        </div>
      </div>

      <div class="form-group">
        <label>Nível de Atividade Física</label>
        <div class="radio-group">
          <label><input type="radio" name="activity" value="sedentary" checked> Sedentário (pouco ou nenhum exercício)</label>
          <label><input type="radio" name="activity" value="light"> Leve (1-3 dias/semana)</label>
          <label><input type="radio" name="activity" value="moderate"> Moderado (3-5 dias/semana)</label>
          <label><input type="radio" name="activity" value="active"> Ativo (6-7 dias/semana)</label>
          <label><input type="radio" name="activity" value="very-active"> Muito Ativo (trabalho físico + exercício)</label>
        </div>
      </div>

      <div class="form-group">
        <label for="goal">Qual seu objetivo?</label>
        <select id="goal" name="goal">
          <option value="lose-weight">Perder Peso</option>
          <option value="maintain-weight" selected>Manter Peso</option>
          <option value="gain-muscle">Ganhar Massa Muscular</option>
        </select>
      </div>

      <button type="submit" class="btn-submit">Calcular</button>
    </form>

    <section id="results" class="hidden">
      <h2>Seus Resultados</h2>
      <div class="results-grid">
        <div class="result-item">
          <h4>Calorias para Manter o Peso</h4>
          <p>~ <span id="maint-cals">0</span> kcal/dia</p>
        </div>
        <div class="result-item primary-result">
          <h4>Calorias para seu Objetivo</h4>
          <p>~ <span id="goal-cals">0</span> kcal/dia</p>
        </div>
      </div>
      <h3>Distribuição de Macronutrientes</h3>
      <div class="macros-grid">
        <div class="macro-item">
          <h5>Proteínas</h5>
          <p><span id="protein">0</span>g</p>
        </div>
        <div class="macro-item">
          <h5>Carboidratos</h5>
          <p><span id="carbs">0</span>g</p>
        </div>
        <div class="macro-item">
          <h5>Gorduras</h5>
          <p><span id="fats">0</span>g</p>
        </div>
      </div>
    </section>
  </div>
  <script src="calculadora.js"></script>
</body>
</html>
