<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar Alimento - NutriAI</title>
  <link rel="stylesheet" href="forms-style.css">
</head>
<body>
  <div class="form-container">
    <header>
      <h1>Registrar Alimento</h1>
      <a href="index.html" class="back-link">← Voltar ao Painel</a>
    </header>

    <form action="#" method="POST">
      <div class="form-group">
        <label for="food-name">Nome do Alimento</label>
        <input type="text" id="food-name" name="food-name" placeholder="Ex: Maçã" required>
      </div>

      <div class="form-group">
        <label for="calories">Calorias (kcal)</label>
        <input type="number" id="calories" name="calories" placeholder="Ex: 52" required min="0">
      </div>

      <div class="form-group">
        <label for="meal-type">Refeição</label>
        <select id="meal-type" name="meal-type">
          <option value="breakfast">Café da Manhã</option>
          <option value="lunch">Almoço</option>
          <option value="dinner">Jantar</option>
          <option value="snack">Lanche</option>
        </select>
      </div>

      <button type="submit" class="btn-submit">Registrar</button>
    </form>
  </div>
</body>
</html>
